<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsere Reisen</title>
<meta name="theme-color" content="#B07A2E">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="/assets/favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<style>
  @font-face {
    font-family: 'Fraunces';
    src: url('/fonts/fraunces-500.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Work Sans';
    src: url('/fonts/work-sans-400.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('/fonts/jetbrains-mono-400.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --paper: #F6F1E7;
    --ink: #26312B;
    --ink-soft: #5A6459;
    --ink-faint: #8B9188;
    --ochre: #B07A2E;
    --line: rgba(38,49,43,0.12);
    --card: #FBF9F3;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    padding: 56px 24px 40px;
  }

  header {
    max-width: 920px;
    margin: 0 auto 48px;
  }

  .eyebrow-top {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ochre);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(30px, 5vw, 46px);
    margin: 0;
    letter-spacing: -0.01em;
  }

  .board {
    max-width: 920px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 28px;
  }

  .card {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card.active:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 22px -12px rgba(38,49,43,0.28);
  }

  .card-map {
    flex: 0 0 46%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-map svg { width: 100%; height: 100%; display: block; }

  .card-body {
    flex: 1;
    padding: 14px 18px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }

  .card-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .card-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
  }

  .card-mid h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 21px;
    margin: 6px 0 2px;
    line-height: 1.15;
    color: var(--ink);
  }

  .card-period {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .card-desc {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-soft);
    margin: 6px 0 0;
  }

  /* Waldviertel - dusty lavender */
  .card.waldviertel .card-map { background: #DCE3F0; }
  .card.waldviertel .map-outline { stroke: #4C5E8C; }
  .card.waldviertel .map-pin { fill: #33406b; }
  .card.waldviertel .card-type { color: #4C5E8C; }

  /* Schneeberg & mehr - sage */
  .card.schneeberg .card-map { background: #DCEEDD; }
  .card.schneeberg .map-outline { stroke: #4F7D5C; }
  .card.schneeberg .map-pin { fill: #33553d; }
  .card.schneeberg .card-type { color: #4F7D5C; }

  /* Tallinn - apricot */
  .card.tallinn .card-map { background: #F4DAD2; }
  .card.tallinn .map-outline { stroke: #A85A3E; }
  .card.tallinn .map-pin { fill: #7c3f2a; }
  .card.tallinn .card-type { color: #A85A3E; }

  .map-outline {
    fill: none;
    stroke-width: 2.5;
    stroke-linejoin: round;
    opacity: 0.75;
  }

  .map-pin {
    stroke: var(--card);
    stroke-width: 2;
  }

  .card.next {
    align-items: center;
    justify-content: center;
    text-align: center;
    border-style: dashed;
    background: transparent;
    color: var(--ink-faint);
    gap: 6px;
    cursor: default;
  }

  .card.next .plus {
    font-family: 'Fraunces', serif;
    font-size: 30px;
  }

  .card.next span.label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  footer {
    max-width: 920px;
    margin: 56px auto 0;
    text-align: center;
  }

  footer a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-faint);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
  }

  footer a:hover { color: var(--ink-soft); }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>
</head>

</header>

  function getStatus(trip) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const start = new Date(trip.start);
    const end = new Date(trip.end);
    if (today >= start && today <= end) return "gerade unterwegs";
    if (today < start) {
      const days = Math.ceil((start - today) / 86400000);
      if (days === 0) return "heute";
      if (days === 1) return "morgen";
      return "in " + days + " Tagen";
    }
    return "";
  }

  const sorted = [...trips].sort((a, b) => new Date(a.start) - new Date(b.start));
  const board = document.getElementById("board");

  sorted.forEach(trip => {
    const el = document.createElement("a");
    el.href = trip.url;
    el.className = "card active " + trip.slug;

    el.innerHTML = `
      <div class="card-map" aria-hidden="true">
        <svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
          <path class="map-outline" d="${trip.mapPath}"/>
          <circle class="map-pin" cx="${trip.pin.x}" cy="${trip.pin.y}" r="6"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-type">${trip.type}</span>
          <span class="card-status">${getStatus(trip)}</span>
        </div>
        <div class="card-mid">
          <h2>${trip.destination}</h2>
          <span class="card-period">${trip.periodLabel}</span>
        </div>
        <p class="card-desc">${trip.description}</p>
      </div>
    `;

    board.appendChild(el);
  });

  const ghost = document.createElement("div");
  ghost.className = "card next";
  ghost.innerHTML = `<span class="plus">+</span><span class="label">Weitere Reisen folgen</span>`;
  board.appendChild(ghost);
</script>

</html>
